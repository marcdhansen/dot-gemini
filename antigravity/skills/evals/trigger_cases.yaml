  - name: devils_advocate_paraphrase
    input: "I want critical pushback and risk analysis on my proposed design"
    expected: devils-advocate
    category: paraphrase

  # ── initialization-briefing ───────────────────────────────────────────────
  - name: init_briefing_new_session
    input: "Starting a new session, give me the briefing"
