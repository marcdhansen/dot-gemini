  - name: mcp_paraphrase
    input: "I need to decide which MCP tool to use for writing to the ~/.agent directory"
    expected: mcp-file-access
    category: paraphrase

  # ── notebooklm ────────────────────────────────────────────────────────────
  - name: notebooklm_query
    input: "Ask my NotebookLM what the architecture looks like"
    expected: notebooklm
    category: positive

  - name: notebooklm_paraphrase
    input: "Check my notebooks for documentation on the query pipeline"
