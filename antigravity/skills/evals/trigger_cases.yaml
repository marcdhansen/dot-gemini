  - name: testing_paraphrase
    input: "I want to check our current test coverage percentage"
    expected: test-runner
    category: paraphrase

  # ── ui ────────────────────────────────────────────────────────────────────
  - name: ui_dev_server
    input: "Start the development server for the web interface"
    expected: ui
    category: positive

  - name: ui_paraphrase
    input: "Deploy the WebUI to staging"
