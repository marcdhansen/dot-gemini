name: skill_routing_eval_v1
description: >
  Tests whether a model routes a user query to the correct skill name,
  or correctly returns "none" when no skill applies.
  Categories: positive (clear match), paraphrase (indirect phrasing),
  negative (no skill should load).

# Valid skill names for reference:
# beads-manager, bridge, browser-manager, code-navigation, code-review,
# context-management, continue, debugging, devils-advocate, finalization,
# git, initialization-briefing, mcp-file-access, multi-model-orchestrator,
# notebooklm, openviking, orchestrator, planning, process, pull-request,
# reflect, retrospective, show-next-task, skill-making, sop-modification,
# tdd, tdd-beads, testing, ui

cases:

  # ── git ──────────────────────────────────────────────────────────────────
  - name: git_commit
    input: "I need to commit my changes and write a good commit message"
    expected: git
    category: positive

  - name: git_merge_conflict
    input: "I have a merge conflict, how do I resolve it?"
    expected: git
    category: positive

  - name: git_paraphrase
    input: "My branch is behind main, I want to clean up the history before opening a PR"
    expected: git
    category: paraphrase

  # ── code-review ───────────────────────────────────────────────────────────
  - name: code_review_pr
    input: "Please review this pull request before I merge it"
    expected: code-review
    category: positive

  - name: code_review_quality
    input: "Check my code for bugs and quality issues"
    expected: code-review
    category: positive

  - name: code_review_paraphrase
    input: "Can you look over this before I merge it into main?"
    expected: code-review
    category: paraphrase

  # ── planning ──────────────────────────────────────────────────────────────
  - name: planning_feature
    input: "Help me plan this new feature before I start coding"
    expected: planning
    category: positive

  - name: planning_blast_radius
    input: "I need to understand what will break if I change this module"
    expected: planning
    category: positive

  - name: planning_paraphrase
    input: "I need to understand the full impact before I change the database layer"
    expected: planning
    category: paraphrase

  # ── tdd ───────────────────────────────────────────────────────────────────
  - name: tdd_write_tests_first
    input: "I'm about to implement a new feature, what tests should I write first?"
    expected: tdd
    category: positive

  - name: tdd_red_green
    input: "I want to start with a failing test for this new feature before writing any code"
    expected: tdd
    category: positive

  - name: tdd_paraphrase
    input: "I want to do this properly — tests before implementation"
    expected: tdd
    category: paraphrase

  # ── debugging ─────────────────────────────────────────────────────────────
  - name: debugging_failing_test
    input: "My tests are unexpectedly failing and I can't find the root cause"
    expected: debugging
    category: positive

  - name: debugging_crash
    input: "The application crashes with a KeyError on line 47"
    expected: debugging
    category: positive

  - name: debugging_paraphrase
    input: "I have a bug that only shows up sometimes and I can't track it down"
    expected: debugging
    category: paraphrase

  # ── finalization ──────────────────────────────────────────────────────────
  - name: finalization_done
    input: "I'm done with my work, help me close out this session properly"
    expected: finalization
    category: positive

  - name: finalization_wrap_up
    input: "All my changes are committed and tests pass, ready to wrap up"
    expected: finalization
    category: positive

  - name: finalization_paraphrase
    input: "I want to make sure everything is pushed and the issue is updated before I stop"
    expected: finalization
    category: paraphrase

  # ── reflect ───────────────────────────────────────────────────────────────
  - name: reflect_correction
    input: "I need to permanently record a correction so we don't repeat this mistake"
    expected: reflect
    category: positive

  - name: reflect_session_end
    input: "I want to save the lessons from this session into the skill files"
    expected: reflect
    category: positive

  # ── retrospective ─────────────────────────────────────────────────────────
  - name: retrospective_post_session
    input: "Finalization is done, now let's do the post-session strategic analysis"
    expected: retrospective
    category: positive

  - name: retrospective_paraphrase
    input: "Session is closing, write the handoff and generate improvement suggestions"
    expected: retrospective
    category: paraphrase

  # ── show-next-task ────────────────────────────────────────────────────────
  - name: show_next_task_what_to_do
    input: "What should I work on next?"
    expected: show-next-task
    category: positive

  - name: show_next_task_paraphrase
    input: "I just finished that issue, what's the highest priority thing to pick up now?"
    expected: show-next-task
    category: paraphrase

  # ── continue ──────────────────────────────────────────────────────────────
  - name: continue_resume
    input: "I'm starting a new session, I need to resume where I left off yesterday"
    expected: continue
    category: positive

  - name: continue_handoff
    input: "Load my handoff from the previous session so I can pick up where we stopped"
    expected: continue
    category: positive

  # ── pull-request ──────────────────────────────────────────────────────────
  - name: pull_request_open
    input: "I'm ready to open a pull request for this feature"
