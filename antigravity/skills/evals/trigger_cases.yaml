    category: positive

  - name: orchestrator_finalize_check
    input: "Verify that all the SOP finalization steps have been completed"
    expected: sop-checker
    category: positive

  # ── context-management ────────────────────────────────────────────────────
  - name: context_full
    input: "The context window is getting full, I need to compress it"
    expected: context-management
    category: positive

  - name: context_paraphrase
    input: "I'm running low on context space and need to manage my window"
    expected: context-management
    category: paraphrase

  # ── beads-manager ─────────────────────────────────────────────────────────
  - name: beads_cross_repo
    input: "Create a linked issue in both the agent-harness and LightRAG repos"
    expected: beads-manager
    category: positive

  - name: beads_paraphrase
    input: "I need to track this work across multiple repositories"
    expected: beads-manager
    category: paraphrase

  # ── tdd-beads ─────────────────────────────────────────────────────────────
  - name: tdd_beads_new_feature
    input: "Create a new beads issue for this feature with TDD scaffolding set up"
    expected: tdd-beads
    category: positive

  # ── code-navigation ───────────────────────────────────────────────────────
  - name: code_nav_find_function
    input: "I need to find where the login function is implemented in this codebase"
    expected: code-search
    category: positive

  - name: code_nav_paraphrase
    input: "Show me all the places in the codebase that reference the storage module"
