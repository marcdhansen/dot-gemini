  # ── bridge ────────────────────────────────────────────────────────────────
  - name: bridge_post_plan
    input: "Submit my implementation plan for review by the other agent"
    expected: bridge
    category: positive

  - name: bridge_paraphrase
    input: "I need Claude and OpenCode to agree on this plan before I proceed"
    expected: bridge
