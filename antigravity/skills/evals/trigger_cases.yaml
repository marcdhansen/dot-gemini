  # ── skill-making ──────────────────────────────────────────────────────────
  - name: skill_making_create
    input: "I want to create a new skill for the agent"
    expected: skill-making
    category: positive

  - name: skill_making_paraphrase
    input: "My skill script fails with EOF errors in non-interactive mode"
    expected: skill-making
    category: paraphrase

  # ── sop-modification ──────────────────────────────────────────────────────
  - name: sop_modify_gate
    input: "I need to modify one of the mandatory quality gates in the SOP"
    expected: sop-modification
    category: positive

  # ── process ───────────────────────────────────────────────────────────────
  - name: process_ci
    input: "Run the full CI pipeline"
    expected: cicd
    category: positive

  - name: process_release
    input: "Prepare a release candidate for version 1.3.0"
    expected: cicd
    category: positive

  # ── testing ───────────────────────────────────────────────────────────────
  - name: testing_run_suite
    input: "Run the full test suite with coverage reporting"
    expected: test-runner
